name: Release (signed APK)

# Cut a public release by pushing a version tag from the (private) source repo:
#   git tag v1.0.0 && git push origin v1.0.0
# The signed APK is built here and published to the PUBLIC releases repo below.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build & publish (e.g. v1.0.0)'
        required: true

env:
  # Public, releases-only repo (source stays private). Change here if it moves.
  RELEASES_REPO: Keryx-Labs/keryx-mobile-wallet-releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"
          # Strictly-increasing versionCode derived from build time (UTC yymmddHH).
          echo "code=$(date -u +%y%m%d%H)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Type-check + build web
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set — cannot sign the release."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/android/app/keystore.jks"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android/app/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ steps.ver.outputs.name }}
          ANDROID_VERSION_CODE: ${{ steps.ver.outputs.code }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Prepare artifacts (rename + checksum)
        id: art
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          test -f "$APK" || { echo "::error::signed APK not found at $APK"; ls -R android/app/build/outputs/apk || true; exit 1; }
          OUT="keryx-wallet-${{ steps.ver.outputs.tag }}.apk"
          cp "$APK" "$OUT"
          sha256sum "$OUT" | tee "$OUT.sha256"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Clean up keystore
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/android/app/keystore.jks"

      - name: Publish release to the public releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::RELEASES_TOKEN secret is not set — need a PAT with contents:write on $RELEASES_REPO."
            exit 1
          fi
          TAG="${{ steps.ver.outputs.tag }}"
          NOTES=$(mktemp)
          {
            echo "## Keryx Wallet — Android ${{ steps.ver.outputs.name }}"
            echo
            echo "Self-custodial Keryx wallet for Android. Your keys, seed and password never leave the device."
            echo
            echo "### Install"
            echo "1. Download \`${{ steps.art.outputs.apk }}\` below."
            echo "2. On your phone, allow installing from this source if prompted, then open the file."
            echo
            echo "### Verify (recommended)"
            echo "\`\`\`"
            cat "${{ steps.art.outputs.apk }}.sha256"
            echo "\`\`\`"
            echo
            echo "See the source repository's CHANGELOG for what's new. iOS build via TestFlight to follow."
          } > "$NOTES"
          gh release create "$TAG" \
            --repo "$RELEASES_REPO" \
            --title "Keryx Wallet Android ${{ steps.ver.outputs.name }}" \
            --notes-file "$NOTES" \
            "${{ steps.art.outputs.apk }}" \
            "${{ steps.art.outputs.apk }}.sha256"
