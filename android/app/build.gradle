apply plugin: 'com.android.application'

// --- Release signing -------------------------------------------------------
// Credentials come from either environment variables (CI: injected from GitHub
// Actions secrets) or a local, git-ignored `keystore.properties` file. Nothing
// secret is ever committed. If no keystore is available (e.g. a normal debug
// build or a contributor without the release key), signing is simply skipped and
// `assembleRelease` produces an unsigned APK — debug builds are unaffected.
def ksPropsFile = rootProject.file("keystore.properties")
def ksProps = new Properties()
if (ksPropsFile.exists()) { ksProps.load(new FileInputStream(ksPropsFile)) }

def ksStoreFile = System.getenv("ANDROID_KEYSTORE_FILE")     ?: ksProps.getProperty("storeFile")
def ksStorePass = System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: ksProps.getProperty("storePassword")
def ksKeyAlias  = System.getenv("ANDROID_KEY_ALIAS")         ?: ksProps.getProperty("keyAlias")
def ksKeyPass   = System.getenv("ANDROID_KEY_PASSWORD")      ?: ksProps.getProperty("keyPassword")
def hasSigning  = ksStoreFile != null && ksStorePass != null && ksKeyAlias != null && ksKeyPass != null

android {
    namespace "app.keryx.wallet"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "app.keryx.wallet"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Overridable by CI so each release gets a strictly increasing versionCode
        // and a versionName taken from the git tag.
        versionCode ((System.getenv("ANDROID_VERSION_CODE") ?: "1") as int)
        versionName System.getenv("ANDROID_VERSION_NAME") ?: "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (hasSigning) {
            release {
                storeFile file(ksStoreFile)
                storePassword ksStorePass
                keyAlias ksKeyAlias
                keyPassword ksKeyPass
                // Sign with both v1 (JAR) and v2 (APK) schemes for broad compatibility.
                v1SigningEnabled true
                v2SigningEnabled true
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
